<div hx-swap-oob="innerHTML:#modal">
    <div class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add New Book</h2>
                <button hx-get="/books/close-modal" hx-target="#modal" hx-swap="innerHTML" class="modal-close">&times;</button>
            </div>
            <form hx-post="/books" hx-target="#book-list" hx-swap="innerHTML"
                  hx-on:htmx:after-request="if(!event.detail.failed) document.getElementById('modal').innerHTML = ''">
                <div class="form-group">
                    <label for="title">Title *</label>
                    <input type="text" id="title" name="title" value="{{ preset_title }}" required>
                </div>
                <div class="form-group">
                    <label for="author">Author *</label>
                    <input type="text" id="author" name="author" value="{{ preset_author }}" required>
                </div>
                <div class="form-group">
                    <label for="isbn">ISBN</label>
                    <input type="text" id="isbn" name="isbn" value="{{ preset_isbn }}">
                </div>
                <div class="form-group checkbox-group">
                    <input type="checkbox" id="read" name="read">
                    <label for="read">I've read this book</label>
                </div>
                <div class="form-group">
                    <label for="rating">Rating</label>
                    <select id="rating" name="rating">
                        <option value="">No rating</option>
                        <option value="1">★☆☆☆☆ (1)</option>
                        <option value="2">★★☆☆☆ (2)</option>
                        <option value="3">★★★☆☆ (3)</option>
                        <option value="4">★★★★☆ (4)</option>
                        <option value="5">★★★★★ (5)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="notes">Notes</label>
                    <textarea id="notes" name="notes"></textarea>
                </div>
                <button type="submit" class="btn">Save Book</button>
            </form>
        </div>
    </div>
</div>
